<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Financeiro · Igreja A Ponte</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0f1115; --surface:#171a21; --surface2:#1d2129; --surface0:#0c0e12;
    --border:#272c36; --text:#e6e8ec; --text2:#9aa0ac; --muted:#6b7280;
    --accent:#3b82f6; --accent-bg:#15233d; --teal:#1baf7a; --red:#e34948;
    --amber:#eda100; --blue:#3987e5; --violet:#9085e9; --orange:#eb6834; --green:#3b9c3b;
    --radius:8px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }
  .hidden { display:none !important; }

  /* Login */
  #login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { background:var(--surface); border:0.5px solid var(--border); border-radius:16px;
    padding:36px 32px; width:100%; max-width:380px; }
  .login-card h1 { font-size:20px; font-weight:600; margin-bottom:4px; }
  .login-card p { color:var(--text2); font-size:13px; margin-bottom:24px; }
  input, select { width:100%; background:var(--surface0); border:0.5px solid var(--border);
    border-radius:var(--radius); padding:10px 12px; color:var(--text); font-size:14px; outline:none; }
  input:focus, select:focus { border-color:var(--accent); }
  label { font-size:12px; color:var(--text2); display:block; margin-bottom:6px; margin-top:14px; }
  .btn { background:var(--accent); color:#fff; border:none; border-radius:var(--radius);
    padding:11px; font-size:14px; font-weight:500; cursor:pointer; width:100%; margin-top:20px; }
  .btn:hover { opacity:.9; }
  .btn-ghost { background:transparent; border:0.5px solid var(--border); color:var(--text2);
    width:auto; padding:8px 14px; margin-top:0; }
  .err { color:var(--red); font-size:12.5px; margin-top:12px; min-height:16px; }

  /* App shell */
  #app { max-width:1100px; margin:0 auto; padding:20px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
    gap:12px; margin-bottom:16px; }
  .topbar h2 { font-size:18px; font-weight:600; }
  .topbar .sub { font-size:12px; color:var(--text2); }
  .toggle { display:inline-flex; border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .toggle span { padding:7px 13px; font-size:12.5px; cursor:pointer; color:var(--text2); }
  .toggle span.on { background:var(--accent-bg); color:var(--accent); }

  .periods { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .periods span { padding:6px 12px; font-size:12.5px; border:0.5px solid var(--border);
    border-radius:var(--radius); color:var(--text2); cursor:pointer; }
  .periods span.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  .tabs { display:flex; gap:2px; flex-wrap:wrap; border-bottom:0.5px solid var(--border); margin-bottom:18px; }
  .tabs button { border:none; background:none; padding:9px 12px; font-size:12.5px; cursor:pointer;
    color:var(--text2); border-bottom:2px solid transparent; display:flex; align-items:center; gap:5px; }
  .tabs button.on { color:var(--accent); border-bottom-color:var(--accent); }

  .grid { display:grid; gap:11px; }
  .cards { grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); }
  .card { background:var(--surface); border-radius:12px; padding:13px 15px; }
  .card .lbl { font-size:11.5px; color:var(--text2); margin-bottom:5px; }
  .card .val { font-size:22px; font-weight:600; font-variant-numeric:tabular-nums; }
  .card .sub { font-size:10.5px; color:var(--muted); margin-top:2px; }

  .panel { background:var(--surface); border-radius:12px; padding:16px; }
  .panel h3 { font-size:13.5px; font-weight:600; margin-bottom:12px; }

  .barrow { margin-bottom:9px; }
  .barrow .top { display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:3px; }
  .barrow .track { height:7px; background:var(--surface0); border-radius:4px; overflow:hidden; }
  .barrow .fill { height:100%; }

  .filterbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .search { flex:1; min-width:140px; display:flex; align-items:center; gap:6px;
    border:0.5px solid var(--border); border-radius:var(--radius); padding:0 10px; }
  .search input { border:none; background:none; padding:8px 0; }
  .chip { padding:5px 11px; font-size:11.5px; border:0.5px solid var(--border);
    border-radius:var(--radius); color:var(--text2); }

  .subnav { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .subnav span { padding:6px 12px; font-size:12.5px; border-radius:20px; cursor:pointer;
    border:0.5px solid var(--border); color:var(--text2); }
  .subnav span.on { background:var(--accent-bg); color:var(--accent); border-color:transparent; }

  .dre-row { display:flex; justify-content:space-between; padding:8px 14px; font-size:13px; }
  .dre-row.h { font-weight:600; border-top:0.5px solid var(--border); }
  .dre-row.i { color:var(--text2); padding-left:20px; cursor:pointer; }
  .dre-row.sub { color:var(--muted); padding-left:36px; font-size:12px; }
  .dre-row.s { font-weight:600; background:var(--surface0); border-radius:6px; }
  .dre-row.r { font-weight:600; background:var(--accent-bg); border-radius:6px; color:var(--accent); }
  .num { font-variant-numeric:tabular-nums; }

  .alert { border-radius:12px; padding:12px 14px; cursor:pointer; }
  .alert .lbl { font-size:11.5px; display:flex; align-items:center; gap:5px; }
  .alert .val { font-size:18px; font-weight:600; margin-top:3px; }

  .loading { text-align:center; padding:40px; color:var(--text2); font-size:13px; }
  .unit-card { background:var(--surface); border-radius:12px; padding:13px; }
  .unit-card .name { font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:7px; margin-bottom:9px; }
  .unit-card .dot { width:9px; height:9px; border-radius:50%; }
  .unit-card .line { display:flex; justify-content:space-between; font-size:11.5px; color:var(--text2); margin-bottom:2px; }
  .unit-card .res { display:flex; justify-content:space-between; font-size:13px; font-weight:600;
    border-top:0.5px solid var(--border); padding-top:6px; margin-top:4px; }

  table.metas { width:100%; border-collapse:collapse; font-size:13px; }
  table.metas td { padding:9px 6px; border-bottom:0.5px solid var(--border); }
  table.metas input { width:120px; padding:6px 8px; }
  .grid-2 { grid-template-columns:1fr 1fr; gap:14px; }

  /* ---- Responsivo (celular). Só afeta telas estreitas; desktop intacto. ---- */
  @media (max-width:640px) {
    #app { padding:12px; }
    .topbar h2 { font-size:16px; }
    .topbar .sub { font-size:11px; }
    /* período e abas viram rolagem horizontal em vez de quebrar em várias linhas */
    .periods, .tabs { flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; }
    .periods::-webkit-scrollbar, .tabs::-webkit-scrollbar { display:none; }
    .periods span, .tabs button { white-space:nowrap; flex:0 0 auto; }
    .card .val { font-size:18px; }
    .grid-2 { grid-template-columns:1fr; }           /* receitas/despesas: 1 coluna */
    .panel { overflow-x:auto; }                       /* tabelas largas rolam, não estouram */
    .dre-row { font-size:12px; padding:7px 10px; }
    .dre-row.sub { padding-left:22px; }
    table.metas input { width:100%; min-width:90px; }
    .filterbar .search { min-width:100%; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h1>A Ponte</h1>
    <p>Painel Financeiro · acesse com suas credenciais</p>
    <label>E-mail</label>
    <input id="email" type="email" placeholder="seu@email.com" autocomplete="username">
    <label>Senha</label>
    <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" onclick="entrar()">Entrar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <div>
      <h2>Painel Financeiro · Igreja A Ponte</h2>
      <div class="sub" id="conn-status">Dados ao vivo Conta Azul</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <div class="toggle" id="regime-toggle">
        <span class="on" data-r="caixa" onclick="setRegime('caixa')">Caixa</span>
        <span data-r="competencia" onclick="setRegime('competencia')">Competência</span>
      </div>
      <button class="btn btn-ghost" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="periods" id="periods">
    <span class="on" data-p="mes" onclick="setPeriodo('mes')">Mês</span>
    <span data-p="tri" onclick="setPeriodo('tri')">Trimestre</span>
    <span data-p="sem" onclick="setPeriodo('sem')">6 meses</span>
    <span data-p="ano" onclick="setPeriodo('ano')">Ano</span>
    <span data-p="custom" onclick="setPeriodo('custom')">Personalizado</span>
  </div>

  <div id="custom-range" class="periods hidden" style="align-items:center;margin-top:-6px">
    <span style="color:var(--text2);border:none;padding:6px 0">De</span>
    <input type="date" id="cd-de" style="width:auto;padding:6px 10px">
    <span style="color:var(--text2);border:none;padding:6px 0">até</span>
    <input type="date" id="cd-ate" style="width:auto;padding:6px 10px">
    <span class="on" style="cursor:pointer" onclick="aplicarCustom()">Aplicar</span>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="screen"><div class="loading">Carregando…</div></div>
</div>

<script>
// ---------- estado ----------
let supa, sessionUser=null;
let regime='caixa', periodo='mes';
let dataDe='2026-05-01', dataAte='2026-05-31';
let analytics=null, activeTab='geral', loading=false;
let fluxo=null, fluxoLoading=false;
let metasByTipo={}; // { orcamento:{chave:valor}, campanha:{...} }
let papel=null, podeEditar=true; // definidos após login (papéis de usuário)
let usuarios=null; // lista de perfis (aba admin)
let subview={}; // sub-aba ativa por tela

async function authHeaders(){
  const { data:{ session } } = await supa.auth.getSession();
  return session ? { Authorization:`Bearer ${session.access_token}` } : {};
}

const fmt = n => (n<0?'-':'')+'R$ '+Math.abs(Math.round(n||0)).toLocaleString('pt-BR');
const fmtk = n => (n<0?'-':'')+'R$ '+(Math.abs(n||0)/1000).toFixed(1).replace('.',',')+'k';
const fmtDataHora = iso => { try{ return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(_){ return ''; } };
const COL = { teal:'#1baf7a', red:'#e34948', amber:'#eda100', blue:'#3987e5',
  violet:'#9085e9', green:'#3b9c3b', orange:'#eb6834' };

// ---------- boot ----------
async function boot(){
  // Captura o tipo do link ANTES do client processar/limpar o hash.
  const hash = new URLSearchParams((location.hash||'').replace(/^#/,''));
  const tipoLink = hash.get('type');
  const cfg = await fetch('/api/config').then(r=>r.json());
  supa = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
  // Convite ou recuperação de senha → tela de definir senha.
  if (tipoLink==='invite' || tipoLink==='recovery'){ mostrarDefinirSenha(); return; }
  const { data:{ session } } = await supa.auth.getSession();
  if (session){ sessionUser=session.user; mostrarApp(); }
}
// Tela para quem chegou por convite/recuperação criar a própria senha.
function mostrarDefinirSenha(){
  const box=document.getElementById('login');
  box.innerHTML=`<div class="login-card">
    <h1>A Ponte</h1><p>Crie sua senha de acesso ao painel</p>
    <label>Nova senha</label>
    <input id="np" type="password" placeholder="mínimo 6 caracteres" autocomplete="new-password">
    <button class="btn" onclick="definirSenha()">Salvar e entrar</button>
    <div class="err" id="np-err"></div></div>`;
  box.classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}
async function definirSenha(){
  const senha=document.getElementById('np').value;
  const err=document.getElementById('np-err'); err.textContent='';
  if(!senha || senha.length<6){ err.textContent='Use ao menos 6 caracteres.'; return; }
  const { error } = await supa.auth.updateUser({ password: senha });
  if(error){ err.textContent=error.message; return; }
  const { data:{ user } } = await supa.auth.getUser();
  sessionUser=user; history.replaceState(null,'',location.pathname); mostrarApp();
}
async function entrar(){
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const err=document.getElementById('login-err'); err.textContent='';
  const { data, error } = await supa.auth.signInWithPassword({ email, password:senha });
  if (error){ err.textContent='E-mail ou senha incorretos.'; return; }
  sessionUser=data.user; mostrarApp();
}
async function sair(){ await supa.auth.signOut(); location.reload(); }

async function mostrarApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await carregarPerfil();
  renderTabs(); setPeriodo('mes');
}
// Busca o papel do usuário logado (admin|financeiro|usuario) e define se edita.
async function carregarPerfil(){
  try{
    const p = await fetch('/api/perfil',{ headers: await authHeaders() }).then(r=>r.json());
    papel = p.papel || 'usuario';
    podeEditar = !!p.podeEditar;
  }catch(_){ papel='usuario'; podeEditar=false; }
}

// ---------- período ----------
function setPeriodo(p){
  periodo=p;
  document.querySelectorAll('#periods span').forEach(s=>s.classList.toggle('on', s.dataset.p===p));
  const cr=document.getElementById('custom-range');
  if(p==='custom'){
    document.getElementById('cd-de').value=dataDe;
    document.getElementById('cd-ate').value=dataAte;
    cr.classList.remove('hidden');
    return; // espera o usuário escolher as datas e clicar Aplicar
  }
  if(cr) cr.classList.add('hidden');
  const now=new Date(2026,4,31); // referência maio/2026 (ajustar p/ data real depois)
  const y=now.getFullYear(), m=now.getMonth();
  const iso=d=>d.toISOString().slice(0,10);
  if(p==='mes'){ dataDe=iso(new Date(y,m,1)); dataAte=iso(new Date(y,m+1,0)); }
  if(p==='tri'){ dataDe=iso(new Date(y,m-2,1)); dataAte=iso(new Date(y,m+1,0)); }
  if(p==='sem'){ dataDe=iso(new Date(y,m-5,1)); dataAte=iso(new Date(y,m+1,0)); }
  if(p==='ano'){ dataDe=iso(new Date(y,0,1)); dataAte=iso(new Date(y,11,31)); }
  carregar();
}
function aplicarCustom(){
  const de=document.getElementById('cd-de').value, ate=document.getElementById('cd-ate').value;
  if(!de||!ate){ return; }
  if(de>ate){ alert('A data inicial não pode ser maior que a final.'); return; }
  dataDe=de; dataAte=ate; fluxo=null; carregar();
}
function setRegime(r){
  regime=r;
  document.querySelectorAll('#regime-toggle span').forEach(s=>s.classList.toggle('on', s.dataset.r===r));
  carregar();
}

// ---------- dados ----------
async function carregar(){
  loading=true; render();
  try{
    const url=`/api/contaazul/analytics?data_de=${dataDe}&data_ate=${dataAte}&regime=${regime}`;
    const r=await fetch(url, { headers: await authHeaders() });
    if(!r.ok){ throw new Error((await r.json()).error||'Erro'); }
    analytics=await r.json();
    const cs=document.getElementById('conn-status');
    if(cs && analytics.sincronizadoEm) cs.textContent=`Conta Azul · sincronizado em ${fmtDataHora(analytics.sincronizadoEm)}`;
  }catch(e){
    analytics={ erro:e.message };
  }
  loading=false; render();
}

// Carrega itens em aberto / fluxo (lazy — só quando uma aba que usa precisa).
async function carregarFluxo(){
  if(fluxo||fluxoLoading) return;
  fluxoLoading=true; render();
  try{ fluxo=await fetch('/api/contaazul/fluxo?dias=365',{ headers: await authHeaders() }).then(r=>r.json()); }
  catch(e){ fluxo={ erro:e.message }; }
  fluxoLoading=false; render();
}
// Carrega metas de um tipo (orcamento|campanha) e indexa por chave.
async function carregarMetas(tipo){
  if(metasByTipo[tipo]) return;
  try{
    const arr=await fetch(`/api/metas?tipo=${tipo}`,{ headers: await authHeaders() }).then(r=>r.json());
    const m={}; (arr||[]).forEach(x=>{ m[x.chave]=Number(x.valor)||0; });
    metasByTipo[tipo]=m;
  }catch(_){ metasByTipo[tipo]={}; }
  render();
}
async function salvarMeta(tipo,chave,valor){
  const ano=Number((dataDe||'2026').slice(0,4))||2026;
  await fetch('/api/metas',{method:'POST',headers:{'Content-Type':'application/json',...(await authHeaders())},
    body:JSON.stringify({ tipo, chave, valor:Number(valor)||0, ano })});
  (metasByTipo[tipo]=metasByTipo[tipo]||{})[chave]=Number(valor)||0;
}

// ---------- abas ----------
const TABS=[
  ['geral','Visão geral'],['dre','DRE'],['recdesp','Receitas e despesas'],
  ['unidades','Unidades'],['orcamento','Orçamento'],
  ['campeven','Campanhas e eventos'],['fluxo','Fluxo e patrimônio'],
];
function renderTabs(){
  const tabs = papel==='admin' ? [...TABS, ['usuarios','Usuários']] : TABS;
  document.getElementById('tabs').innerHTML=tabs.map(([id,l])=>
    `<button class="${id===activeTab?'on':''}" onclick="go('${id}')">${l}</button>`).join('');
}
function go(id){
  activeTab=id; renderTabs(); render();
  if(id==='orcamento'){ carregarMetas('orcamento'); }
  if(id==='campeven'){ carregarMetas('campanha'); carregarFluxo(); }
  if(id==='fluxo'){ carregarFluxo(); }
  if(id==='usuarios'){ carregarUsuarios(); }
}
function setSub(tela,v){ subview[tela]=v; render(); }

// ---------- usuários (admin) ----------
async function carregarUsuarios(){
  try{
    const d=await fetch('/api/perfil?listar=1',{ headers: await authHeaders() }).then(r=>r.json());
    usuarios=d.perfis||[];
  }catch(_){ usuarios=[]; }
  render();
}
window.alterarPapel=async(email,p)=>{
  await fetch('/api/perfil',{method:'POST',headers:{'Content-Type':'application/json',...(await authHeaders())},
    body:JSON.stringify({ email, papel:p })});
  await carregarUsuarios();
};
window.convidarUsuario=async()=>{
  const nome=document.getElementById('nu-nome').value.trim();
  const email=document.getElementById('nu-email').value.trim();
  const p=document.getElementById('nu-papel').value;
  const msg=document.getElementById('nu-msg'); msg.style.color='var(--text2)'; msg.textContent='Enviando…';
  const r=await fetch('/api/perfil',{method:'POST',headers:{'Content-Type':'application/json',...(await authHeaders())},
    body:JSON.stringify({ email, nome, papel:p, convidar:true })});
  const d=await r.json().catch(()=>({}));
  if(r.ok){ msg.style.color='var(--teal)'; msg.textContent='Pronto — convite enviado / papel definido.'; document.getElementById('nu-email').value=''; await carregarUsuarios(); }
  else { msg.style.color='var(--red)'; msg.textContent=(d.error||'Erro')+(d.dica?` — ${d.dica}`:''); }
};

// ---------- render ----------
function bar(label,val,max,color){
  const pct=Math.min(100,Math.abs(val)/(max||1)*100);
  return `<div class="barrow"><div class="top"><span style="color:var(--text2)">${label}</span>
    <span class="num">${fmt(val)}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

function render(){
  const scr=document.getElementById('screen');
  if(loading){ scr.innerHTML='<div class="loading">Carregando dados da Conta Azul…</div>'; return; }
  if(analytics && analytics.erro){
    scr.innerHTML=`<div class="loading" style="color:var(--red)">
      Não foi possível carregar: ${analytics.erro}<br><br>
      <span style="color:var(--text2)">Se a conta ainda não foi conectada, isso é esperado — conecte o Conta Azul e recarregue.</span></div>`;
    return;
  }
  if(!analytics){ scr.innerHTML='<div class="loading">Sem dados.</div>'; return; }
  scr.innerHTML=(SCREENS[activeTab]||(()=>'<div class="loading">—</div>'))();
}

const SCREENS={
  geral(){
    const t=analytics.totais||{entradas:0,saidas:0,resultado:0};
    const u=(analytics.unidades||[]).slice(0,6);
    const maxU=Math.max(1,...u.map(x=>Math.abs(x.resultado)));
    return `<div class="grid cards" style="margin-bottom:18px">
      <div class="card"><div class="lbl">Entradas</div><div class="val" style="color:${COL.teal}">${fmt(t.entradas)}</div></div>
      <div class="card"><div class="lbl">Saídas</div><div class="val" style="color:${COL.red}">${fmt(t.saidas)}</div></div>
      <div class="card"><div class="lbl">Resultado</div><div class="val" style="color:${t.resultado>=0?COL.blue:COL.red}">${fmt(t.resultado)}</div></div>
      <div class="card"><div class="lbl">Lançamentos</div><div class="val">${analytics.qtdLancamentos||0}</div></div>
    </div>
    <h3 style="font-size:13.5px;margin-bottom:10px">Resultado por unidade</h3>
    <div class="panel">${u.map(x=>bar(x.nome,x.resultado,maxU,x.resultado>=0?COL.teal:COL.red)).join('')||'<div style="color:var(--text2)">Sem dados de unidade.</div>'}</div>`;
  },

  dre(){
    const d=analytics.dre; if(!d) return '<div class="loading">Sem DRE.</div>';
    const s=d.subtotais;
    const view=window._dreView||'sint';
    let rows=[];
    rows.push(['RECEITA OPERACIONAL BRUTA', s.receitaOperacionalBruta, 'h']);
    // grupos de receita operacional
    for(const [grupo,info] of Object.entries(d.receitasPorGrupo)){
      if(info.tipo!=='operacional') continue;
      rows.push([grupo, info.total, 'i']);
      if(view==='anal') for(const [cat,v] of Object.entries(info.categorias)) rows.push([cat, v, 'sub']);
    }
    rows.push(['(−) Deduções — taxas de cartão', -s.deducoes, 'i']);
    if(view==='anal' && d.deducoes) for(const [cat,v] of Object.entries(d.deducoes.categorias)) rows.push([cat,-v,'sub']);
    rows.push(['= RECEITA OPERACIONAL LÍQUIDA', s.receitaLiquida, 's']);
    rows.push(['(−) DESPESAS OPERACIONAIS', -s.despesaTotal, 'h']);
    for(const [grupo,info] of Object.entries(d.despesasPorGrupo)){
      rows.push([grupo, -info.total, 'i']);
      if(view==='anal') for(const [cat,v] of Object.entries(info.categorias)) rows.push([cat,-v,'sub']);
    }
    rows.push(['= RESULTADO OPERACIONAL', s.resultadoOperacional, 's']);
    if(s.receitaNaoOperacional) rows.push(['(+) Rendimentos de aplicações', s.receitaNaoOperacional, 'i']);
    rows.push(['= RESULTADO LÍQUIDO', s.resultadoLiquido, 'r']);

    const body=rows.map(([l,v,t])=>{
      let vc='var(--text)'; if(v<0&&(t==='i'||t==='sub'))vc=COL.red; if(t==='r')vc='var(--accent)';
      return `<div class="dre-row ${t}"><span>${l}</span><span class="num" style="color:${vc}">${fmt(v)}</span></div>`;
    }).join('');

    const m=d.memoria||{};
    return `<div class="topbar" style="margin-bottom:14px">
      <div style="font-size:14px;font-weight:600">Demonstrativo de resultado</div>
      <div class="toggle">
        <span class="${view==='sint'?'on':''}" onclick="setDreView('sint')">Sintética</span>
        <span class="${view==='anal'?'on':''}" onclick="setDreView('anal')">Analítica</span>
      </div></div>
      <div class="panel" style="padding:8px 4px">${body}</div>
      <div class="panel" style="background:var(--surface0);margin-top:14px">
        <div style="font-size:11.5px;color:var(--muted);margin-bottom:8px">Memória de cálculo — fora do resultado</div>
        <div style="display:flex;gap:20px;flex-wrap:wrap;font-size:12px;color:var(--text2)">
          <span>Transferências: <b style="color:var(--text)">${fmt(m.transferencias)}</b></span>
          <span>Empréstimos: <b style="color:var(--text)">${fmt(m.emprestimos)}</b></span>
          <span>Mov. de caixa: <b style="color:var(--text)">${fmt(m.movimentoCaixa)}</b></span>
        </div></div>`;
  },

  recdesp(){
    const f=window._rdFiltro||'ambos';
    const chip=(v,l)=>`<span class="chip" style="cursor:pointer;${f===v?'background:var(--accent-bg);color:var(--accent);border-color:transparent':''}" onclick="setRdFiltro('${v}')">${l}</span>`;
    return `<div class="filterbar">
      <div class="search"><span style="color:var(--muted)">⌕</span>
        <input id="rd-busca" placeholder="Buscar categoria…" oninput="filtrarRD()" value="${(window._rdBusca||'').replace(/"/g,'&quot;')}"></div>
      ${chip('ambos','Tudo')}${chip('receitas','Só receitas')}${chip('despesas','Só despesas')}</div>
    <div class="grid ${f==='ambos'?'grid-2':''}" id="rd-grid">${rdGridHTML()}</div>`;
  },

  unidades(){
    const u=analytics.unidades||[];
    const cols=[COL.teal,COL.blue,COL.violet,COL.amber,COL.green,COL.red,COL.orange];
    return `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(195px,1fr))">
      ${u.map((x,i)=>`<div class="unit-card">
        <div class="name"><span class="dot" style="background:${cols[i%cols.length]}"></span>${x.nome}</div>
        <div class="line"><span>Receita</span><span class="num">${fmtk(x.receita)}</span></div>
        <div class="line"><span>Despesa</span><span class="num">${fmtk(x.despesa)}</span></div>
        <div class="res"><span>Resultado</span><span class="num" style="color:${x.resultado>=0?COL.teal:COL.red}">${fmtk(x.resultado)}</span></div>
      </div>`).join('')||'<div class="loading">Sem dados de unidade.</div>'}</div>`;
  },

  orcamento(){
    const sv=subview.orc||'meta';
    const d=analytics.dre; if(!d) return '<div class="loading">Sem dados.</div>';
    const subnav=`<div class="subnav">
      <span class="${sv==='meta'?'on':''}" onclick="setSub('orc','meta')">Realizado vs meta</span>
      <span class="${sv==='folha'?'on':''}" onclick="setSub('orc','folha')">Folha de pessoal</span></div>`;

    if(sv==='folha'){
      const pessoal=(d.despesasPorGrupo['Pessoal']||{categorias:{}}).categorias;
      const rows=Object.entries(pessoal).sort((a,b)=>b[1]-a[1]);
      const max=Math.max(1,...rows.map(r=>r[1]));
      return subnav+`<div class="panel">${rows.map(([c,v])=>bar(c,v,max,COL.violet)).join('')||'Sem despesas de pessoal no período.'}</div>`;
    }

    const metas=metasByTipo.orcamento;
    if(!metas) return subnav+'<div class="loading">Carregando metas…</div>';
    const editing=window._orcEdit;
    const grupos=Object.keys(d.despesasPorGrupo);
    if(editing){
      const linhas=grupos.map(g=>`<tr><td>${g}</td><td class="num">${fmt(d.despesasPorGrupo[g].total)}</td>
        <td><input type="number" value="${metas[g]||0}" data-g="${g}"></td></tr>`).join('');
      return subnav+`<div class="panel"><table class="metas">
        <tr><td style="color:var(--text2)">Grupo de despesa</td><td style="color:var(--text2)">Realizado</td><td style="color:var(--text2)">Meta (R$/período)</td></tr>
        ${linhas}</table><div style="margin-top:12px"><button class="btn btn-ghost" onclick="salvarOrc()">Salvar metas</button></div></div>`;
    }
    const linhas=grupos.map(g=>{
      const real=d.despesasPorGrupo[g].total, meta=metas[g]||0;
      const pct=meta>0?real/meta*100:0;
      const cor=meta===0?COL.blue:(pct<80?COL.teal:(pct<=100?COL.amber:COL.red));
      const dir=meta?`${fmt(real)} / ${fmt(meta)} <b style="color:${cor}">${Math.round(pct)}%</b>`:`${fmt(real)} <span style="color:var(--muted)">sem meta</span>`;
      return `<div class="barrow"><div class="top"><span style="color:var(--text2)">${g}</span><span class="num">${dir}</span></div>
        <div class="track"><div class="fill" style="width:${Math.min(100,pct)}%;background:${cor}"></div></div></div>`;
    }).join('');
    const botao=podeEditar?`<button class="btn btn-ghost" onclick="window._orcEdit=true;render()">Editar metas</button>`:'';
    return subnav+`<div style="display:flex;justify-content:flex-end;margin-bottom:10px">${botao}</div>
      <div class="panel">${linhas}</div>
      <p style="color:var(--muted);font-size:11.5px;margin-top:10px">Semáforo: verde abaixo de 80% da meta · amarelo 80–100% · vermelho acima da meta.</p>`;
  },

  campeven(){
    const sv=subview.camp||'campanhas';
    const subnav=`<div class="subnav">
      <span class="${sv==='campanhas'?'on':''}" onclick="setSub('camp','campanhas')">Campanhas</span>
      <span class="${sv==='eventos'?'on':''}" onclick="setSub('camp','eventos')">Eventos</span></div>`;
    const uni=Object.fromEntries((analytics.unidades||[]).map(u=>[u.nome,u]));
    const aRec=Object.fromEntries(((fluxo&&fluxo.aReceber&&fluxo.aReceber.porCentro)||[]).map(x=>[x.unidade,x.valor]));
    const itensDe=key=>((fluxo&&fluxo.aReceber&&fluxo.aReceber.itens)||[]).filter(i=>(i.centro||'').toUpperCase().includes(key));

    if(sv==='eventos'){
      const u=uni['Eventos']||{receita:0,despesa:0,resultado:0};
      return subnav+cardCentro('Eventos',u,aRec['Eventos']||0)+listaAberto('A receber de eventos',itensDe('EVENTO'));
    }
    const u=uni['Campanha']||{receita:0,despesa:0,resultado:0};
    const metas=metasByTipo.campanha||{}; const meta=metas['Campanha']||0;
    const pct=meta>0?u.receita/meta*100:0;
    const cor=meta===0?COL.blue:(pct>=100?COL.teal:(pct>=80?COL.amber:COL.red));
    const editing=window._campEdit;
    const metaBox=editing
      ? `<div style="margin-top:12px">Meta: <input type="number" id="campMeta" value="${meta}" style="width:130px"> <button class="btn btn-ghost" onclick="salvarCamp()">Salvar</button></div>`
      : (podeEditar?`<button class="btn btn-ghost" style="margin-top:12px" onclick="window._campEdit=true;render()">${meta?'Editar meta':'Definir meta'}</button>`:'');
    const barra=meta?`<div class="barrow"><div class="top"><span style="color:var(--text2)">Arrecadado vs meta</span>
        <span class="num">${fmt(u.receita)} / ${fmt(meta)} <b style="color:${cor}">${Math.round(pct)}%</b></span></div>
        <div class="track"><div class="fill" style="width:${Math.min(100,pct)}%;background:${cor}"></div></div></div>`:'';
    return subnav+`<div class="panel"><h3>Campanha</h3>${barra}
      <div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:8px;font-size:12.5px;color:var(--text2)">
        <span>Arrecadado: <b style="color:${COL.teal}">${fmt(u.receita)}</b></span>
        <span>Gasto: <b style="color:${COL.red}">${fmt(u.despesa)}</b></span>
        <span>Resultado: <b>${fmt(u.resultado)}</b></span>
        <span>A receber (futuro): <b style="color:${COL.amber}">${fmt(aRec['Campanha']||0)}</b></span>
      </div>${metaBox}</div>`+listaAberto('Parcelas a receber da campanha',itensDe('CAMPANHA'));
  },

  fluxo(){
    const sv=subview.flx||'proj';
    const subnav=`<div class="subnav">
      <span class="${sv==='proj'?'on':''}" onclick="setSub('flx','proj')">Fluxo projetado</span>
      <span class="${sv==='rec'?'on':''}" onclick="setSub('flx','rec')">Créditos a receber</span>
      <span class="${sv==='pag'?'on':''}" onclick="setSub('flx','pag')">A pagar</span>
      <span class="${sv==='mov'?'on':''}" onclick="setSub('flx','mov')">Movimentações</span></div>`;
    if(fluxoLoading||!fluxo) return subnav+'<div class="loading">Carregando fluxo em aberto…</div>';
    if(fluxo.erro) return subnav+`<div class="loading" style="color:var(--red)">Erro: ${fluxo.erro}</div>`;
    const p=fluxo.projecao;

    if(sv==='proj'){
      const linha=(lbl,r,pg)=>`<div class="dre-row i" style="cursor:default">
        <span style="flex:2">${lbl}</span>
        <span class="num" style="flex:1;text-align:right;color:${COL.teal}">${fmt(r)}</span>
        <span class="num" style="flex:1;text-align:right;color:${COL.red}">-${fmt(pg).replace('-','')}</span>
        <span class="num" style="flex:1;text-align:right;color:${(r-pg)>=0?COL.teal:COL.red}">${fmt(r-pg)}</span></div>`;
      return subnav+`<div class="grid cards" style="margin-bottom:16px">
        <div class="card"><div class="lbl">Saldo proj. 30 dias</div><div class="val" style="color:${(p.receber.d30-p.pagar.d30)>=0?COL.teal:COL.red}">${fmt(p.receber.d30-p.pagar.d30)}</div></div>
        <div class="card"><div class="lbl">60 dias</div><div class="val" style="color:${(p.receber.d60-p.pagar.d60)>=0?COL.teal:COL.red}">${fmt(p.receber.d60-p.pagar.d60)}</div></div>
        <div class="card"><div class="lbl">90 dias</div><div class="val" style="color:${(p.receber.d90-p.pagar.d90)>=0?COL.teal:COL.red}">${fmt(p.receber.d90-p.pagar.d90)}</div></div>
      </div>
      <div class="panel" style="padding:8px 4px">
        <div class="dre-row h"><span style="flex:2">Janela (a partir de hoje)</span><span style="flex:1;text-align:right">A receber</span><span style="flex:1;text-align:right">A pagar</span><span style="flex:1;text-align:right">Saldo</span></div>
        ${linha('Vencido (ainda em aberto)',p.receber.vencido,p.pagar.vencido)}
        ${linha('Próximos 30 dias',p.receber.d30,p.pagar.d30)}
        ${linha('31–60 dias',p.receber.d60,p.pagar.d60)}
        ${linha('61–90 dias',p.receber.d90,p.pagar.d90)}
        ${linha('Além de 90 dias',p.receber.futuro,p.pagar.futuro)}
      </div>`;
    }
    if(sv==='rec'){
      const m=fluxo.aReceber.porMes, max=Math.max(1,...m.map(x=>x.valor));
      return subnav+`<div class="panel">${m.map(x=>bar(x.mes,x.valor,max,COL.teal)).join('')||'Nada a receber em aberto.'}</div>
        ${listaAberto('Itens a receber em aberto',fluxo.aReceber.itens)}`;
    }
    if(sv==='pag'){
      const m=fluxo.aPagar.porMes, max=Math.max(1,...m.map(x=>x.valor));
      return subnav+`<div class="panel">${m.map(x=>bar(x.mes,x.valor,max,COL.red)).join('')||'Nada a pagar em aberto.'}</div>
        ${listaAberto('Itens a pagar em aberto',fluxo.aPagar.itens)}`;
    }
    const mem=(analytics.dre&&analytics.dre.memoria)||{transferencias:0,emprestimos:0,movimentoCaixa:0};
    return subnav+`<div class="panel"><h3>Movimentações financeiras (fora da DRE)</h3>
      <div style="display:flex;gap:24px;flex-wrap:wrap;font-size:13px;color:var(--text2)">
        <span>Transferências: <b style="color:var(--text)">${fmt(mem.transferencias)}</b></span>
        <span>Empréstimos: <b style="color:var(--text)">${fmt(mem.emprestimos)}</b></span>
        <span>Movimento de caixa: <b style="color:var(--text)">${fmt(mem.movimentoCaixa)}</b></span>
      </div></div>
      <div class="panel" style="margin-top:14px"><h3>Contas bancárias</h3>
        <div style="font-size:12.5px;color:var(--text2)">${(fluxo.contas||[]).map(c=>`<div class="line" style="display:flex;justify-content:space-between;padding:4px 0"><span>${c.nome}</span><span style="color:var(--muted)">${c.banco||c.tipo||''}</span></div>`).join('')||'—'}</div>
        <p style="color:var(--muted);font-size:11px;margin-top:8px">A API v2 do Conta Azul não expõe o saldo por conta — apenas o cadastro.</p></div>`;
  },

  usuarios(){
    if(papel!=='admin') return '<div class="loading">Acesso restrito aos administradores.</div>';
    if(!usuarios) return '<div class="loading">Carregando usuários…</div>';
    const opt=(sel)=>['admin','financeiro','usuario'].map(p=>`<option value="${p}" ${sel===p?'selected':''}>${p}</option>`).join('');
    const rows=usuarios.map(u=>`<tr><td>${u.nome||'—'}</td><td>${u.email}</td>
      <td><select onchange="alterarPapel('${u.email}',this.value)">${opt(u.papel)}</select></td></tr>`).join('');
    return `<div class="panel"><h3>Usuários e papéis</h3>
      <p style="color:var(--text2);font-size:12px;margin-bottom:10px">admin: tudo + gestão de usuários · financeiro: vê e edita · usuario: só visualiza.</p>
      <table class="metas"><tr><td style="color:var(--text2)">Nome</td><td style="color:var(--text2)">E-mail</td><td style="color:var(--text2)">Papel</td></tr>
      ${rows||'<tr><td colspan="3" style="color:var(--text2)">Nenhum usuário ainda.</td></tr>'}</table></div>
      <div class="panel" style="margin-top:14px"><h3>Convidar usuário</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
          <div><label>Nome</label><input id="nu-nome" style="width:160px"></div>
          <div><label>E-mail</label><input id="nu-email" type="email" style="width:230px"></div>
          <div><label>Papel</label><select id="nu-papel" style="width:140px">${opt('usuario')}</select></div>
          <button class="btn btn-ghost" onclick="convidarUsuario()">Convidar</button>
        </div>
        <div class="err" id="nu-msg"></div>
        <p style="color:var(--muted);font-size:11px;margin-top:8px">O convite envia um e-mail para a pessoa criar a própria senha. Se o e-mail não chegar, depende da configuração SMTP do Supabase (Authentication → Emails).</p>
      </div>`;
  },
};

// Helpers das telas de campanha/eventos.
function cardCentro(nome,u,fut){
  return `<div class="panel"><h3>${nome}</h3>
    <div style="display:flex;gap:24px;flex-wrap:wrap;font-size:12.5px;color:var(--text2)">
      <span>Arrecadado: <b style="color:${COL.teal}">${fmt(u.receita)}</b></span>
      <span>Gasto: <b style="color:${COL.red}">${fmt(u.despesa)}</b></span>
      <span>Resultado: <b>${fmt(u.resultado)}</b></span>
      <span>A receber (futuro): <b style="color:${COL.amber}">${fmt(fut)}</b></span></div></div>`;
}
function listaAberto(titulo,itens){
  if(!fluxo) return `<div class="panel" style="margin-top:14px">Carregando itens em aberto…</div>`;
  if(!itens||!itens.length) return `<div class="panel" style="margin-top:14px"><h3>${titulo}</h3><div style="color:var(--text2)">Nenhum item em aberto.</div></div>`;
  const rows=itens.slice(0,40).map(i=>`<div class="dre-row i" style="cursor:default"><span>${(i.vencimento||'').slice(0,10)} · ${i.descricao}</span><span class="num">${fmt(i.nao_pago)}</span></div>`).join('');
  return `<div class="panel" style="margin-top:14px;padding:8px 4px"><div style="padding:6px 14px;font-weight:600">${titulo} (${itens.length})</div>${rows}</div>`;
}
window.salvarOrc=async()=>{
  for(const inp of document.querySelectorAll('#screen input[data-g]')) await salvarMeta('orcamento',inp.dataset.g,inp.value);
  window._orcEdit=false; render();
};
window.salvarCamp=async()=>{
  const v=document.getElementById('campMeta'); if(v) await salvarMeta('campanha','Campanha',v.value);
  window._campEdit=false; render();
};
window.setSub=setSub;

// Receitas e despesas: busca por categoria + filtro de tipo.
function rdGridHTML(){
  const rd=(analytics&&analytics.receitasDespesas)||{receitas:[],despesas:[]};
  const termo=(window._rdBusca||'').toLowerCase();
  const filtro=window._rdFiltro||'ambos';
  const filtra=arr=>arr.filter(x=>(x.categoria||'').toLowerCase().includes(termo));
  const r=filtra(rd.receitas), d=filtra(rd.despesas);
  const maxr=Math.max(1,...r.map(x=>x.valor)), maxd=Math.max(1,...d.map(x=>x.valor));
  const vazio='<div style="color:var(--text2)">Nada encontrado.</div>';
  const blocoR=`<div><h3 style="color:${COL.teal}">Receitas por categoria</h3>
    <div class="panel">${r.map(x=>bar(x.categoria,x.valor,maxr,COL.teal)).join('')||vazio}</div></div>`;
  const blocoD=`<div><h3 style="color:${COL.red}">Despesas por categoria</h3>
    <div class="panel">${d.map(x=>bar(x.categoria,x.valor,maxd,COL.red)).join('')||vazio}</div></div>`;
  if(filtro==='receitas') return blocoR;
  if(filtro==='despesas') return blocoD;
  return blocoR+blocoD;
}
window.filtrarRD=()=>{
  const inp=document.getElementById('rd-busca'); window._rdBusca=inp?inp.value:'';
  const g=document.getElementById('rd-grid'); if(g) g.innerHTML=rdGridHTML();
};
window.setRdFiltro=(v)=>{ window._rdFiltro=v; render(); };
window.aplicarCustom=aplicarCustom;

window.setDreView=v=>{ window._dreView=v; render(); };
window.go=go; window.setPeriodo=setPeriodo; window.setRegime=setRegime;
window.entrar=entrar; window.sair=sair; window.definirSenha=definirSenha;

boot();
</script>
</body>
</html>
